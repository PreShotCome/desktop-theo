appId: com.preshotcome.theodesktop
productName: Theo Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
  createDesktopShortcut: true
# Auto-update feed. The installed app reads app-update.yml (generated from this)
# and checks the PUBLIC releases repo for new versions — no token needed at
# runtime because the repo is public. Publishing (upload) needs a GH token; the
# app's download path does not.
publish:
  - provider: github
    owner: PreShotCome
    repo: theo-desktop-releases
    releaseType: release
